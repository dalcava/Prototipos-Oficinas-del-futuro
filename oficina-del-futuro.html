<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Oficina del Futuro</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    height: 100vh;
  }

  h1 {
    text-align: center;
    margin-top: 80px;
  }

  /* Contenedor del botón */
  .back-container {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 1000;
  }

  /* Botón circular */
  .back-btn {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    background: linear-gradient(135deg, #1e3a8a, #2563eb);
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s ease;
  }

  .back-btn:hover {
    transform: translateY(-4px);
    box-shadow: 0 15px 30px rgba(0, 0, 0, 0.25);
  }

  .back-btn svg {
    width: 24px;
    height: 24px;
    stroke: white;
    stroke-width: 2;
    fill: none;
  }

  /* Tooltip */
  .tooltip {
    margin-top: 10px;
    background: #0f172a;
    color: white;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 14px;
    opacity: 0;
    transform: translateY(-5px);
    transition: all 0.2s ease;
    white-space: nowrap;
  }

  .back-container:hover .tooltip {
    opacity: 1;
    transform: translateY(0);
  }

</style>
</head>

<body>

<div class="back-container">
  <button class="back-btn" onclick="volver()">
    <svg viewBox="0 0 24 24">
      <path d="M15 18l-6-6 6-6"/>
    </svg>
  </button>
  <div class="tooltip">Volver al home</div>
</div>

<script>
  function volver() {
    window.location.href = "index.html";
  }
</script>
    <iframe style="border: 1px solid rgba(0, 0, 0, 0.1);" width="100%" height="900px" src="https://www.figma.com/embed?embed_host=share&url=https%3A%2F%2Fwww.figma.com%2Fproto%2FgQwmpaiHxb7nN2qWgJxYrO%2FOficina-del-futuro%3Fnode-id%3D207-327%26t%3DjIDaZ3mKKev4nXgb-1%26scaling%3Dmin-zoom%26content-scaling%3Dfixed%26page-id%3D0%253A1%26starting-point-node-id%3D207%253A327%26show-proto-sidebar%3D1" allowfullscreen></iframe>
</body>
</html>
